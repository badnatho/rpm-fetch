name: docker

# Every run: full test suite first; the image job only starts if tests pass.
# Pull requests and branch pushes: build + smoke-test only (no publish).
# A pushed tag starting with `v` (e.g. v1.2.3): build and push to GHCR.
#   - always pushes the version tag (ghcr.io/<owner>/<repo>:1.2.3)
#   - also pushes `:latest` when the tag is newly created (github.event.created)
#
# Actions are pinned to commit SHAs (comment shows the tag they were resolved
# from) so a moved tag upstream can't inject code into this pipeline.
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to GHCR

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.14'

      - name: Byte-compile
        run: python -m compileall -q rpm_fetch tests

      - name: Run tests
        run: python -W error::ResourceWarning -m unittest discover -s tests -t . -v

  build:
    name: Build image
    needs: test
    runs-on: ubuntu-latest
    env:
      # True for a pushed tag like `v1.2.3`.
      IS_RELEASE: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          # We control `latest` ourselves (see the conditional raw tag below).
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ env.IS_RELEASE == 'true' && github.event.created == true }}
            type=ref,event=branch
            type=ref,event=pr

      - name: Log in to GHCR
        if: env.IS_RELEASE == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on a v* tag)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: ${{ env.IS_RELEASE == 'true' }}
          load: ${{ env.IS_RELEASE != 'true' }}   # load locally so we can smoke-test
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        if: env.IS_RELEASE != 'true'
        run: |
          image=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n1)
          docker run --rm "$image" --version
          docker run --rm "$image" --help > /dev/null
